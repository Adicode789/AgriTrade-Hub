<html lang="en" th:replace="~{base::layout(~{::main})}">
<body>
  <main>
    <!-- Hero Section -->
    <div class="row">
		<section class="hero-section d-flex align-items-center text-center text-white">
		      <div class="container hero-content">
		        <h1 class="fw-bold display-4 text-info">Contact Us</h1>
		        <p class="lead">We’d love to hear from you. Let’s connect and grow together.</p>
		      </div>
		    </section>		
	</div>

    <!-- Contact Info Section -->
    <section class="container py-5">
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card contact-card border-0 shadow-sm text-center p-4 rounded-4">
            <div class="card-body">
              <i class="bi bi-geo-alt-fill fs-1 text-primary"></i>
              <h5 class="fw-bold mt-3">Our Office</h5>
              <p class="text-muted">123 Green Street, Lucknow, India</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card contact-card border-0 shadow-sm text-center p-4 rounded-4">
            <div class="card-body">
              <i class="bi bi-telephone-fill fs-1 text-success"></i>
              <h5 class="fw-bold mt-3">Call Us</h5>
              <p class="text-muted mb-1">+91 99561 110388</p>
              <p class="text-muted">Mon - Sat: 9:00 AM - 6:00 PM</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card contact-card border-0 shadow-sm text-center p-4 rounded-4">
            <div class="card-body">
              <i class="bi bi-envelope-fill fs-1 text-danger"></i>
              <h5 class="fw-bold mt-3">Email Us</h5>
              <p>
                <a href="mailto:support@mywebsite.com" class="text-decoration-none text-muted">
                  support@mywebsite.com
                </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Contact Form & Map -->
    <section class="container py-5">
      <div class="row g-4">
        <!-- Form -->
        <div class="col-lg-6">
          <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4">
              <h3 class="fw-bold mb-4 text-success">Send us a Message</h3>
              <form method="post" th:object="${enq}">
                <div class="form-floating mb-3">
                  <input th:field="*{name}" type="text" class="form-control rounded-3" placeholder="Your Name" required>
                  <label>Your Name</label>
                </div>
                <div class="form-floating mb-3">
                  <input th:field="*{contactNumber}" type="text" class="form-control rounded-3" placeholder="Contact Number" required>
                  <label>Contact Number</label>
                </div>
                <div class="form-floating mb-3">
                  <input th:field="*{email}" type="email" class="form-control rounded-3" placeholder="Your Email" required>
                  <label>Your Email</label>
                </div>
                <div class="form-floating mb-3">
                  <select th:field="*{subject}" class="form-select rounded-3" required>
                    <option value="">-- Select --</option>
                    <option value="General">General</option>
                    <option value="Support">Support</option>
                    <option value="Feedback">Feedback</option>
                    <option value="Business">Business</option>
                  </select>
                  <label>Subject</label>
                </div>
                <div class="form-floating mb-3">
                  <textarea th:field="*{message}" class="form-control rounded-3" placeholder="Message" style="height:120px" required></textarea>
                  <label>Message</label>
                </div>
                <button type="submit" class="btn btn-success w-100 rounded-3">
                  <i class="bi bi-send-fill me-2"></i>Send Message
                </button>
              </form>
            </div>
          </div>
        </div>
        <!-- Map -->
        <div class="col-lg-6">
          <div class="card shadow border-0 rounded-4 overflow-hidden">
            <div class="ratio ratio-16x9">
              <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3558.9931323483253!2d80.94616621436365!3d26.846693083153904!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x399bfb3a3a5b7d2f%3A0xaaa!2sLucknow%2C%20Uttar%20Pradesh!5e0!3m2!1sen!2sin!4v1695659478900!5m2!1sen!2sin" 
                style="border:0;" allowfullscreen loading="lazy">
              </iframe>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Social Media -->
    <section class="bg-light py-4">
      <div class="container text-center">
        <h5 class="fw-bold mb-3">Follow Us</h5>
        <a href="https://facebook.com" target="_blank" class="social-icon me-2 text-primary"><i class="bi bi-facebook fs-4"></i></a>
        <a href="https://x.com" target="_blank" class="social-icon me-2 text-info"><i class="bi bi-twitter fs-4"></i></a>
        <a href="https://instagram.com" target="_blank" class="social-icon me-2 text-danger"><i class="bi bi-instagram fs-4"></i></a>
        <a href="https://linkedin.com" target="_blank" class="social-icon text-primary"><i class="bi bi-linkedin fs-4"></i></a>
      </div>
    </section>
	
	
	<style>
	    /* Hero Overlay Gradient */
	    .hero-section {
	      background: url('../Images/coldstorage.png') center/cover no-repeat;
	      height: 350px;
	      position: relative;
	    }
	    .hero-section::before {
	      content: "";
	      position: absolute;
	      inset: 0;
	      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6));
	    }
	    .hero-content {
	      position: relative;
	      z-index: 1;
	    }
	    /* Glassmorphism Cards */
	    .contact-card {
	      backdrop-filter: blur(6px);
	      transition: transform 0.3s ease, box-shadow 0.3s ease;
	    }
	    .contact-card:hover {
	      transform: translateY(-5px);
	      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
	    }
	    /* Social Icons */
	    .social-icon {
	      display: inline-flex;
	      align-items: center;
	      justify-content: center;
	      width: 50px;
	      height: 50px;
	      border-radius: 50%;
	      background: #f1f1f1;
	      transition: all 0.3s ease;
	    }
	    .social-icon:hover {
	      transform: translateY(-4px);
	      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
	    }
	  </style>
  </main>
  

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
