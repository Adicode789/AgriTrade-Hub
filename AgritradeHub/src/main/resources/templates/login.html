<html th:replace="~{base::layout(~{::main})}">
  <body style="width: 100%">
    <main>
      <!-- Background -->
      <div class="min-vh-100 d-flex justify-content-center align-items-center" 
           style="background: linear-gradient(to right, #e8f5e9, #f1f8e9);">

        <!-- Login Card -->
        <div class="card shadow-lg rounded-4 w-100" style="max-width: 420px;">
          <div class="card-body p-4">

            <!-- Logo + Title -->
            <div class="text-center mb-4">
              <img src="/images/logo.jpg" alt="AgriTrade Logo" class="img-fluid mb-2" width="30%">
              <h4 class="fw-bold text-success">AgriTrade Login</h4>
              <p class="text-muted small">Bridging the gap between farmers and markets</p>
            </div>

            <!-- Login Form -->
            <form method="post">
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input name="email" type="email" class="form-control rounded-3" id="email" placeholder="you@example.com" required>
              </div>

              <div class="mb-3 position-relative">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                  <input name="password" type="password" class="form-control rounded-start-3" id="password" placeholder="Enter your password" required>
                  <button type="button" class="btn btn-outline-secondary rounded-end-3" id="togglePassword">
                    👁
                  </button>
                </div>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe">
                  <label class="form-check-label small" for="rememberMe">Remember me</label>
                </div>
<!--                <a href="#" class="small text-decoration-none text-success">Forgot password?</a>
-->              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-success rounded-3">Login</button>
              </div>
            </form>

            <!-- Divider -->
<!--            <div class="text-center my-3 text-muted small">— or continue with —</div>
-->
            <!-- Social Login -->
            <!--<div class="d-grid gap-2 mb-3">
              <button class="btn btn-outline-danger rounded-3" type="button">Google</button>
              <button class="btn btn-outline-primary rounded-3" type="button">Facebook</button>
            </div>
-->
            <!-- Signup Link -->
            <!--<div class="text-center">
              <p class="mb-0 small">New to AgriTrade? 
                <a href="/Registration" class="text-success fw-semibold text-decoration-none">Create an account</a>
              </p>
            </div>-->

          </div>
        </div>
      </div>

      <!-- Password Toggle Script -->
      <script>
        document.getElementById("togglePassword").addEventListener("click", function() {
          const passwordField = document.getElementById("password");
          const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
          passwordField.setAttribute("type", type);
        });
      </script>

      <!-- Bootstrap JS -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </main>
  </body>
</html>
